<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="Counter-Strike Nexon: Studio - Patch Information" />
    <meta name="author" content="ZxAnugrah" />

    <title>Patch Info · CSNS Bahasa Indonesia Fix</title>

    <!-- Favicon -->
    <link rel="icon" href="./res/img/csn-logo.png" />

    <!-- Styles -->
    <link rel="stylesheet" href="css/patch-info.css" />

    <!-- Security Style -->
    <style>
      * {
        -webkit-user-select: none !important;
        -moz-user-select: none !important;
        -ms-user-select: none !important;
        user-select: none !important;
      }

      img {
        -webkit-user-drag: none;
        user-drag: none;
      }

      body {
        -webkit-touch-callout: none !important;
      }
    </style>
  </head>
  <body>
    <div class="changelog-container">
      <!-- ===== CONTENT AREA ===== -->
      <main class="changelog-content"></main>
    </div>

    <script>
      // ===== SECURITY RESTRICTIONS =====

      document.addEventListener("contextmenu", (e) => e.preventDefault());
      document.addEventListener("selectstart", (e) => e.preventDefault());
      document.addEventListener("dragstart", (e) => e.preventDefault());
      document.addEventListener("copy", (e) => e.preventDefault());
      document.addEventListener("cut", (e) => e.preventDefault());
      document.addEventListener("paste", (e) => e.preventDefault());

      document.addEventListener("keydown", function (e) {
        const blockedKeys = ["F12", "F3"];
        const ctrlKeys = ["u", "U", "s", "S", "p", "P", "a", "A", "c", "C", "v", "V", "x", "X", "f", "F"];

        if (blockedKeys.includes(e.key) || e.keyCode === 123) {
          e.preventDefault();
          return false;
        }

        if (e.ctrlKey && ctrlKeys.includes(e.key)) {
          e.preventDefault();
          return false;
        }

        if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) {
          e.preventDefault();
          return false;
        }

        if (e.key === "Backspace" || e.keyCode === 8) {
          const target = e.target;
          if (!target.tagName.match(/INPUT|TEXTAREA/i) && !target.isContentEditable) {
            e.preventDefault();
            return false;
          }
        }
      });

      // ===== NAVIGATION =====

      function goBackToLauncher() {
        window.location.href = "index.html";
      }

      // ===== THEME TOGGLE =====

      let isDarkMode = true;

      function toggleTheme() {
        const body = document.body;
        const themeBtn = document.getElementById("themeToggle");
        const themeIcon = themeBtn.querySelector(".theme-icon");
        const themeText = themeBtn.querySelector(".theme-text");

        if (isDarkMode) {
          body.classList.add("light-mode");
          themeIcon.textContent = "☀️";
          themeText.textContent = "Light Mode";
          localStorage.setItem("patchinfo-theme", "light");
        } else {
          body.classList.remove("light-mode");
          themeIcon.textContent = "🌙";
          themeText.textContent = "Dark Mode";
          localStorage.setItem("patchinfo-theme", "dark");
        }

        isDarkMode = !isDarkMode;
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("patchinfo-theme");
      if (savedTheme === "light") {
        document.body.classList.add("light-mode");
        const themeBtn = document.getElementById("themeToggle");
        themeBtn.querySelector(".theme-icon").textContent = "☀️";
        themeBtn.querySelector(".theme-text").textContent = "Light Mode";
        isDarkMode = false;
      }

      // Hide link preview
      document.querySelectorAll("a").forEach((link) => {
        const originalHref = link.getAttribute("href");
        if (!originalHref) return;

        link.setAttribute("data-href", originalHref);
        link.removeAttribute("href");
        link.style.cursor = "pointer";

        link.addEventListener("click", function (e) {
          e.preventDefault();
          const targetHref = this.getAttribute("data-href");
          const target = this.getAttribute("target");

          if (target === "_blank") {
            window.open(targetHref, "_blank");
          } else {
            window.location.href = targetHref;
          }
        });
      });
    </script>
  </body>
</html>
